name: Deploy to WordPress

on:
  push:
    branches: [ main ]
    paths: [ 'posts/**' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm init -y
        npm install axios front-matter
        
    - name: Deploy to WordPress
      env:
        WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
        WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
        WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
      run: |
        cat > deploy.js << 'EOF'
        const fs = require('fs');
        const path = require('path');
        const axios = require('axios');
        const fm = require('front-matter');

        async function deployToWordPress() {
          const postsDir = './posts';
          const files = fs.readdirSync(postsDir).filter(file => file.endsWith('.md'));
          
          for (const file of files) {
            const filePath = path.join(postsDir, file);
            const content = fs.readFileSync(filePath, 'utf8');
            const parsed = fm(content);
            
            const postData = {
              title: parsed.attributes.title,
              content: parsed.body,
              status: parsed.attributes.status || 'publish',
              categories: parsed.attributes.categories || [],
              tags: parsed.attributes.tags || [],
              excerpt: parsed.attributes.excerpt || '',
              date: parsed.attributes.date || new Date().toISOString()
            };
            
            try {
              const response = await axios.post(
                `${process.env.WORDPRESS_URL}/wp-json/wp/v2/posts`,
                postData,
                {
                  auth: {
                    username: process.env.WORDPRESS_USERNAME,
                    password: process.env.WORDPRESS_PASSWORD
                  },
                  headers: {
                    'Content-Type': 'application/json'
                  }
                }
              );
              
              console.log(`Successfully deployed: ${postData.title}`);
              console.log(`Post URL: ${response.data.link}`);
            } catch (error) {
              if (error.response && error.response.status === 400) {
                console.log(`Post "${postData.title}" may already exist, skipping...`);
              } else {
                console.error(`Error deploying ${postData.title}:`, error.message);
                process.exit(1);
              }
            }
          }
        }

        deployToWordPress();
        EOF
        
        node deploy.js
